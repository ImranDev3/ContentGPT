services:
  - type: web
    name: contentgpt-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /v1/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: MANIFEST_BASE_URL
        value: https://app.manifest.build/v1
      - key: MANIFEST_MODEL
        value: auto
      - key: MANIFEST_API_KEY
        sync: false   # set this in the Render dashboard — never commit a real key
      - key: GOOGLE_API_KEY
        sync: false   # optional — for higher-quality web search
      - key: GOOGLE_CSE_ID
        sync: false   # optional
